line-length = 80
target-version = "py311"

[lint]
ignore = [
  "E501", # line too long — handled by formatter
]
select = [
  "E", # pycodestyle errors
  "W", # pycodestyle warnings
  "F", # pyflakes
  "I", # isort (import sorting)
  "N", # pep8-naming
  "UP", # pyupgrade
  "A", # flake8-builtins
  "B", # flake8-bugbear
  "C4", # flake8-comprehensions
  "PIE", # flake8-pie (unnecessary pass, etc.)
  "SIM", # flake8-simplify (suggests simpler code)
  "RET", # flake8-return (unnecessary return statements)
  "RUF", # Ruff-specific rules (catches many bugs)
]

# Allow unused variables when underscore-prefixed
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.isort]
force-sort-within-sections = true
known-first-party = ["your_package_name"] # <-- replace with your package name
split-on-trailing-comma = true

[format]
indent-style = "space"
line-ending = "auto"
quote-style = "double"
skip-magic-trailing-comma = false
