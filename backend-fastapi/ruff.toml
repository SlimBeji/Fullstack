line-length = 80
target-version = "py311"

[lint]
ignore = [
  "C408", # prefer dict() over {} literals
  "E501", # line too long — handled by formatter
  "B008", # FastAPI uses Depends() in function signatures by design
]
select = [
  "E", # pycodestyle errors
  "W", # pycodestyle warnings
  "F", # pyflakes
  "I", # isort (import sorting)
  "N", # pep8-naming
  "UP", # pyupgrade
  "A", # flake8-builtins
  "B", # flake8-bugbear
  "C4", # flake8-comprehensions
  "PIE", # flake8-pie (unnecessary pass, etc.)
  "SIM", # flake8-simplify (suggests simpler code)
  "RET", # flake8-return (unnecessary return statements)
  "RUF", # Ruff-specific rules (catches many bugs)
]
# Allow unused variables when underscore-prefixed
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[lint.per-file-ignores]
"**/__init__.py" = ["F403", "F401"] # allow wildcard imports and unused imports in __init__.py
"**/conftest.py" = ["E402"]

[lint.isort]
force-sort-within-sections = true
split-on-trailing-comma = true

[format]
indent-style = "space"
line-ending = "auto"
quote-style = "double"
skip-magic-trailing-comma = false
